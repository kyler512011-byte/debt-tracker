<!DOCTYPE html>
<html>
<head>
  <title>Outstanding Balance of Back Salary, Expenses, and Interest</title>
  <style>
    .display {
      font-size: 64px;
      font-weight: bold;
      margin-top: 40px;
    }

    .dollars {
      color: #00ffcc;
    }

    .cents {
      font-size: 32px;
      color: #00ffaa;
      margin-left: 5px;
    }

    .breakdown {
      margin-top: 20px;
      font-size: 18px;
      color: #ccc;
    }

    .breakdown span {
      color: #fff;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1>Outstanding Balance of Back Salary, Expenses, and Interest</h1>

<div class="display">
  <span class="dollars" id="dollars">$0</span>
  <span class="cents" id="cents">.0000</span>
</div>

<div class="breakdown">
  <p>Starting Balance: <span id="principal">$35000.00</span></p>
  <p>Accrued Interest: <span id="interest">$0.00</span></p>
  <p><strong>Total Owed: <span id="total">$0.00</span></strong></p>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
  const startingAmount = 35000.00;
  const annualRate = 0.12; // 12% compounding
  const startTime = new Date("2017-06-01T00:00:00").getTime();

  function formatMoney(num, decimals = 3) {
    return num.toLocaleString("en-US", {
      minimumFractionDigits: 2,
      maximumFractionDigits: decimals
    });
  }

  function updateCounter() {
    const now = new Date().getTime();
    const yearsElapsed = Math.max(0, (now - startTime) / (1000*60*60*24*365));

    // Continuous compounding formula
    const total = startingAmount * Math.exp(annualRate * yearsElapsed);
    const interest = total - startingAmount;

    // Split dollars and cents
    const parts = total.toFixed(3).split(".");
    const dollars = Number(parts[0]).toLocaleString("en-US");
    const cents = "." + parts[1];

    // Update ticker
    const dollarsElem = document.getElementById("dollars");
    const centsElem = document.getElementById("cents");
    if(dollarsElem && centsElem) {
      dollarsElem.innerText = "$" + dollars;
      centsElem.innerText = cents;
    }

    // Update breakdown
    document.getElementById("principal").innerText = "$" + formatMoney(startingAmount);
    document.getElementById("interest").innerText = "$" + formatMoney(interest);
    document.getElementById("total").innerText = "$" + formatMoney(total);
  }

  setInterval(updateCounter, 100); // update 10 times/sec
  updateCounter();
});
</script>

</body>
</html>
