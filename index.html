<!DOCTYPE html>
<html>
<head>
  <title>
    Outstanding Balance of Back Salary
  </title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
      background-color: #111;
      color: #fff;
    }
    .amount {
      font-size: 60px;
      font-weight: bold;
      color: #00ffcc;
    }
    .rate {
      margin-top: 20px;
      font-size: 18px;
      color: #aaa;
    }
  </style>
</head>
<body>
<h1> Outstanding Balance of Back Salary and Interest</h1>
<div class="amount" id="counter">$0.00</div>
<div class="rate">Accruing with the promised compounding interest at 12% annually</div>

<script>
  const startingAmount = 35000.00;
  const annualRate = 0.12;

  const startTime = new Date("2017-05-01T00:00:00").getTime();

  function updateCounter() {
    const now = new Date().getTime();
    const yearsElapsed = (now - startTime) / (1000 * 60 * 60 * 24 * 365);
    const safeYears = Math.max(0, yearsElapsed);
    const total = startingAmount * Math.pow(1 + annualRate, safeYears);

    document.getElementById("counter").innerText = 
      "$" + total.toLocaleString(undefined, {
        minimumFractionDigits: 2,
        maximumFractionDigits: 4
      });
  }
  setInterval(updateCounter, 1000);
  updateCounter();
</script>
</body>
<body>
<h1>Outstanding Balance of Back Salary</h1>

<div class="display">
  <span class="dollars" id="dollars">$0</span>
  <span class="cents" id="cents">.0000</span>
</div>

<div class="breakdown">
  <p>Starting Balance: <span id="principal">$35000.00</span></p>
  <p>Accrued Interest: <span id="interest">$0.00</span></p>
  <p><stong> Total Owed: <span id="total">$0.00</span></stong></p>

<style>
  .display {
    font-size: 64px;
    font-weight: bold;
    margin-top: 40px;
  }

  .dollars {
    color: #00ffcc
  }

  .cents {
    font-size: 32px;
    color: #00ffaa;
    margin-left: 5px;
  }

  .breakdown {
    margin-top: 0px;
    font-size: 18px;
    color: #ccc
  }
  .breakdown span {
    color: #fff;
    font-weight: bold;
  }
</style>

<script>
  const startingAmount = 35000.00;
  const annualRate = 0.12

  const startTime = new Date("2017-06-01T00:00:00").getTime();

  function formatMoney(num, decimals = 4) {
    return num.toLocaleString("en-US", {
      minimumFractionDigits: 2,
      maximumFractionDigits: 4
    });
  }
  function updateCounter() {
    const now = new Date().getTime();
    const yearsElapsed = Math.max(0, (now - startTime) / (1000 * 60 * 60 * 24 * 365));
    const total = startingAmount * Math.exp(annualRate * yearsElapsed);
    const interest = total - startingAmount;
    const parts = total.toFixed(4).split(".");
    const dollars = Number(parts[0]).toLocaleString("en-US");
    const cents = "." + parts[1];

    document.getElementById("dollars").innerText = "$" + dollars;
    document.getElementById("cents").innerText = cents;

    document.getElementById("principal").innerText = 
      "$" + formatMoney(startingAmount);
    document.getElementById("interest").innerText = 
      "$" + formatMoney(interest);
    document.getElementById("total").innerText=
      "$" + formatMoney(total);
  }

  setInterval(updateCounter, 100);
  updateCounter();
</script>
</body>
</html>
