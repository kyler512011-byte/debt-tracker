<!DOCTYPE html>
<html>
<head>
  <title>
    Outstanding Balance
  </title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
      background-color: #111;
      color: #fff;
    }
    .amount {
      font-size: 60px;
      font-weight: bold;
      color: #00ffcc;
    }
    .rate {
      margin-top: 20px;
      font-size: 18px;
      color: #aaa;
    }
  </style>
</head>
<body>
<h1> Outstanding Balance</h1>
<div class="amount" id="counter">$0.00</div>
<div class="rate">Accruing at 15% compounding</div>

<script>
  const startingAmount = 30000.00;
  const annualRate = 0.15;

  const startTime = new Date("2018-03-01T00:00:00").getTime();

  function updateCounter() {
    const now = new Date().getTime();
    const yearsElapsed = (now - startTime) / (1000 * 60 * 60 * 24 * 365);
    const safeYears = Math.max(0, yearsElapsed);
    const total = startingAmount * Math.pow(1 + annualRate, safeYears);

    document.getElementById("counter").innerText = 
      "$" + total.toLocaleString(undefined, {
        minimumFractionDigits: 2,
        maximumFractionDigits: 4
      });
  }
  setInterval(updateCounter, 1000);
  updateCounter();
</script>
</body>
</html>
